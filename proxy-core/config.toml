[server]
port = 8080

[[server.tls.certs]]
cert_path = "/workspace/certs/p384.crt"
key_path = "/workspace/certs/p384.key"

[server.tls]
alpn_protocols = ["h3", "h2", "http/1.1"]
zero_rtt = false
pqc_hybrid = false

[quic]
enable = true
port = 8443
multipath = true
qmux = true

[[routes]]
domain = "localhost"
upstream = "127.0.0.1:9190"

[proxy]
[[proxy.tcp]]
listen_port = 8081
upstream = "127.0.0.1:9191"

[[proxy.udp]]
listen_port = 8082
upstream = "127.0.0.1:9192"
