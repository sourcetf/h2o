# Proxy Core Configuration

# Certificate and Key Paths
cert-path = "/web/cert/cert.pem"
key-path = "/web/cert/cert.key"

# Output paths for auto-generated files
ech-output-path = "/workspace/ech_config"
dns-zone-path = "/workspace/dns.zone"

# ECH Configuration
[ech]
public-name = "v.qq.com"
cipher-suite = "HKDF-SHA384/AES-256-GCM"
max-name-length = 64
advertise = true
